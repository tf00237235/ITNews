name: Daily ITNews Push

on:
  schedule:
    # 台灣 08:00 = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "只列印不真的推播 (0/1)"
        required: false
        default: "0"

permissions:
  contents: write

concurrency:
  group: daily-itnews
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ITNews push
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
          MAX_ITEMS: "20"
          LOOKBACK_HOURS: "36"
        run: python -m src.main

      - name: Commit updated seen.json
        if: ${{ github.event.inputs.dry_run != '1' }}
        run: |
          if [[ -n "$(git status --porcelain state/seen.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/seen.json
            git commit -m "chore: update seen.json [skip ci]"
            git push
          else
            echo "No changes to seen.json"
          fi
